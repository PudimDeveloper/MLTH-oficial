<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html" charset="UTF-8">
  <title>MLTH</title>
  <style>
    @keyframes margin-top-animation {
      0% { margin-top: -70px; };
      100% { margin-top: 0px; };
    }
    body { background-color: gray; }
    .papel {
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 0 15px;
      height: -40px;
      width: -40px;
    }
    #title {
      font-family: Arial;
      text-align: center;
      animation: margin-top-animation 1s;
    }
    .margin_top {
      animation: margin-top-animation 1s
    }
    .text {
      text-align: center;
      font-size: 18px;
      font-family: Arial;
    }
    #copy {
      font-size: 16px;
      text-align: center;
    }
    .hide {
      color: white;
      animation: margin-top-animation 1s;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="papel">
    <header>
      <div class="hide">.</div>
      <h1 id="title" class="margin_top">Site oficial de MLTH</h1>
    </header>
    <main>
      <p class="text">Oque você deseja?</p>
      <a href="open_code.html" class="text">Código aberto</a>
    </main>
    <footer>
      <br>
      <p id="copy">© Todos direitos reservados 2026</p>
      <br><br><br><br>
      <div class="hide">.</div>
    </footer>
  </div>
  
</body>
</html>
